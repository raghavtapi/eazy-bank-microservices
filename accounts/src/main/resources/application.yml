server:
  port: 8080

spring:
  application:
    name: "accounts"
  profiles:
    active:
      - "prod"
  datasource:
    url: jdbc:mysql://localhost:3306/accountsdb
    username: root
    password: root
  jpa:
    show-sql: true
  sql:
    init:
      mode: always
  config:
    # This optional tells the accounts microservice that even if due to any reason we are not able to connect
    # to config server than also start the accounts' microservice. "optional:" is optional here.
    #import: "configserver:http://localhost:8071/"
    import: "optional:configserver:http://localhost:8071/"

# Since we are using config server we don't need these properties on individual microservice level
# These properties can now be found at configserver/src/main/resources/config/accounts.yml
#  config:
#    import:
#      - "application_qa.yml"
#      - "application_prod.yml"
